<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusGate 全局监控控制面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <div class="shell">
    <aside class="sidebar">
      <h1>NexusGate</h1>
      <p class="muted">Global Ops Panel</p>
      <nav id="nav"></nav>
      <div class="card hint">
        <p class="muted">入口建议</p>
        <p>请通过 <code>/admin/ui/</code> 访问，避免静态资源 404。</p>
      </div>
    </aside>

    <main class="main">
      <header class="card header">
        <div>
          <p class="tiny">运维型全局监控控制面板</p>
          <h2 id="page-title">全局监控控制面板</h2>
          <p id="page-desc" class="muted">服务状态、路由行为、token 使用和节省量一屏观察。</p>
        </div>
        <div id="global-badges" class="badges"></div>
      </header>

      <section class="card conn" id="conn"></section>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-upstream" class="view"></section>
      <section id="view-memory" class="view"></section>
      <section id="view-pack" class="view"></section>
      <section id="view-trace" class="view"></section>
      <section id="view-clients" class="view"></section>
    </main>
  </div>

  <script src="js/state.js"></script>
  <script src="js/views.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
